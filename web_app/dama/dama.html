<!DOCTYPE html>
<html>
<style>
    .b {
        display: grid;
        grid-template-columns: repeat(8, 40px);
    }

    .s {
        width: 40px;
        height: 40px;
    }

    .black {
        background: #555;
    }

    .white {
        background: #eee;
    }
</style>

<body>
    <div class="b" id="b"></div>
    <script>
        for (let i = 0; i < 64; i++) {
            const s = document.createElement('div');
            s.className = `s ${(Math.floor(i / 8) + i) % 2 == 0 ? 'white' : 'black'}`;
            if (i < 16 && (Math.floor(i / 8) + i) % 2 != 0) s.innerText = '🔴';
            document.getElementById('b').appendChild(s);
        }
    </script>
</body>

</html>
