<!DOCTYPE html>
<html>

<head>
    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(7, 40px);
            gap: 5px;
            background: blue;
            padding: 5px;
        }

        .cell {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div class="grid" id="g"></div>
    <script>
        for (let i = 0; i < 42; i++) {
            const d = document.createElement('div'); d.className = 'cell';
            d.onclick = () => d.style.background = 'red';
            document.getElementById('g').appendChild(d);
        }
    </script>
</body>

</html>
