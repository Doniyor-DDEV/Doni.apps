<!DOCTYPE html>
<html>

<body>
    <div id="p" style="width:20px; height:20px; background:blue; border-radius:50%; position:absolute"></div>
    <script>
        let s = 20;
        window.onclick = () => { s += 5; document.getElementById('p').style.width = s + "px"; document.getElementById('p').style.height = s + "px"; };
    </script>
</body>

</html>
