<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            background: #222;
            border: 2px solid #555;
            max-width: 100%;
        }
    </style>
</head>

<body>
    <canvas id="game" width="320" height="400"></canvas>
    <script>
        const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
        let ball = { x: 160, y: 350, dx: 2, dy: -2, r: 7 };
        let paddle = { w: 70, h: 10, x: 125 };
        let bricks = [];
        for (let r = 0; r < 4; r++) { bricks[r] = []; for (let c = 0; c < 5; c++) bricks[r][c] = { x: 0, y: 0, s: 1 }; }

        function draw() {
            ctx.clearRect(0, 0, 320, 400);
            ctx.fillStyle = "#0095DD"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "white"; ctx.fillRect(paddle.x, 380, paddle.w, paddle.h);

            bricks.forEach((row, r) => row.forEach((b, c) => {
                if (b.s) {
                    b.x = c * 60 + 10; b.y = r * 25 + 30;
                    ctx.fillStyle = "orange"; ctx.fillRect(b.x, b.y, 50, 20);
                    if (ball.x > b.x && ball.x < b.x + 50 && ball.y > b.y && ball.y < b.y + 20) { ball.dy *= -1; b.s = 0; }
                }
            }));

            ball.x += ball.dx; ball.y += ball.dy;
            if (ball.x < 0 || ball.x > 320) ball.dx *= -1;
            if (ball.y < 0) ball.dy *= -1;
            if (ball.y > 380 && ball.x > paddle.x && ball.x < paddle.x + paddle.w) ball.dy *= -1;
            if (ball.y > 400) { alert("Yutqazdingiz!"); location.reload(); }
            requestAnimationFrame(draw);
        }
        canvas.addEventListener('touchmove', e => {
            let rect = canvas.getBoundingClientRect();
            paddle.x = e.touches[0].clientX - rect.left - paddle.w / 2;
        });
        draw();
    </script>
</body>

</html>
